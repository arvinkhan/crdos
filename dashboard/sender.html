<!DOCTYPE html>
<html>
<head>
<title>CRDAS Traffic Simulator</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
padding:40px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
background:#3b82f6;
color:white;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div style="margin-bottom:20px;">
<a href="/dashboard">Dashboard</a> |
<a href="/sender">Traffic Simulator</a> |
<a href="/api/products">Test API</a>
</div>

<h1>Traffic Simulator</h1>

<p>Send requests to CRDAS</p>

<button onclick="sendProducts()">Request /api/products</button>

<button onclick="sendUsers()">Request /api/users</button>

<button onclick="burst()">Traffic Burst (50 requests)</button>

<p id="status"></p>

<script>

async function sendProducts(){
await fetch("/api/products")
document.getElementById("status").innerText="Sent /api/products"
}

async function sendUsers(){
await fetch("/api/users")
document.getElementById("status").innerText="Sent /api/users"
}

async function burst(){

for(let i=0;i<50;i++){
fetch("/api/products?page="+(i%3))
}

document.getElementById("status").innerText="50 requests sent"

}

</script>

</body>
</html>
