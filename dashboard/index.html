<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRDAS Admin Gateway Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0B0E14;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 260px;
            background: rgba(15, 23, 42, 0.6);
            border-right: 1px solid var(--border-glass);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .logo { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 0.5rem; }
        .main-content {
            flex: 1;
            padding: 3rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 1.5rem;
        }
        .stat-header { color: var(--text-muted); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 0.5rem;}
        .stat-value { font-size: 2.5rem; font-weight: 700; }
        .logs-section {
            background: var(--glass-bg);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 2rem;
            min-height: 400px;
        }
        .log-entry {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--border-glass);
        }
        .log-service {
            font-size: 0.8rem;
            padding: 0.3rem 0.75rem;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .log-badge {
            width: 120px;
            text-align: center;
            padding: 0.25rem 0;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">🛡️ CRDAS Admin</div>
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 1rem;">
            <a href="/weather" target="_blank" style="color: var(--text-muted); text-decoration: none; padding: 1rem; border-radius: 8px; border: 1px solid var(--border-glass); background: rgba(0,0,0,0.2);">🌦️ Weather App -></a>
            <a href="/result" target="_blank" style="color: var(--text-muted); text-decoration: none; padding: 1rem; border-radius: 8px; border: 1px solid var(--border-glass); background: rgba(0,0,0,0.2);">🎓 Result Portal -></a>
        </div>
    </aside>
    <main class="main-content">
        <h1 style="margin-bottom: 2rem;">Cross-Service Proxy Diagnostics</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">Total Service Requests</div>
                <div class="stat-value" id="valTotal">0</div>
            </div>
            <div class="stat-card" style="border-bottom: 4px solid var(--success)">
                <div class="stat-header">Served from Micro-Cache (HIT)</div>
                <div class="stat-value" id="valHits" style="color: var(--success)">0</div>
            </div>
            <div class="stat-card" style="border-bottom: 4px solid var(--danger)">
                <div class="stat-header">API Backend Escalations (MISS)</div>
                <div class="stat-value" id="valMisses" style="color: var(--danger)">0</div>
            </div>
        </div>

        <div class="logs-section">
            <h2 style="margin-top: 0; margin-bottom: 1.5rem; color: var(--text-main);">Detailed Traffic Monitor</h2>
            <div id="logsContainer"></div>
        </div>
    </main>

    <script>
        async function fetchDashboard() {
            try {
                const [statsRes, logsRes] = await Promise.all([ fetch('/stats'), fetch('/logs') ]);
                const stats = await statsRes.json();
                const logs = await logsRes.json();

                document.getElementById('valTotal').innerText = stats.totalRequests;
                document.getElementById('valHits').innerText = stats.hits;
                document.getElementById('valMisses').innerText = stats.misses;

                const c = document.getElementById('logsContainer');
                c.innerHTML = '';
                
                if (logs.length === 0) {
                    c.innerHTML = '<div style="color: var(--text-muted)">Proxy is ready. Waiting for network traffic from any registered microservice...</div>';
                    return;
                }

                logs.slice(-12).reverse().forEach(log => {
                    const isHit = log.type === 'CACHE HIT';
                    const div = document.createElement('div');
                    div.className = 'log-entry';
                    div.style.borderLeft = `4px solid ${isHit ? 'var(--success)' : 'var(--danger)'}`;
                    
                    const sColor = log.service === 'WEATHER' ? '#0284c7' : '#8b5cf6';
                    
                    div.innerHTML = `
                        <div style="width: 90px; color: var(--text-muted);">${log.time}</div>
                        <div class="log-badge" style="background: ${isHit ? 'rgba(16, 185, 129, 0.15)' : 'rgba(239, 68, 68, 0.15)'}; color: ${isHit ? 'var(--success)' : 'var(--danger)'}">
                            ${log.type}
                        </div>
                        <div style="flex: 1; display: flex; align-items: center; gap: 1rem;">
                            ${log.service ? `<span class="log-service" style="background: ${sColor}">${log.service}</span>` : ''}
                            <span>${log.message}</span>
                        </div>
                    `;
                    c.appendChild(div);
                });
            } catch(e) {}
        }

        fetchDashboard();
        setInterval(fetchDashboard, 1000);
    </script>
</body>
</html>
